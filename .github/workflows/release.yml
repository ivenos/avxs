name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update BSL Change Date
        run: |
          NEW_DATE=$(date -d "+4 years" +%Y-%m-%d)
          sed -i "s/^Change Date:.*/Change Date:          $NEW_DATE/" LICENSE

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION#v}\"/" Cargo.toml

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LICENSE Cargo.toml
          git diff --staged --quiet || git commit -m "chore: release ${{ github.event.inputs.version }}"
          git tag ${{ github.event.inputs.version }}
          git push origin main
          git push origin ${{ github.event.inputs.version }}
