name: Bug Report
description: Something is not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in as much detail as possible. Attach logs (`RUST_LOG=debug`) when relevant.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant output (run with `RUST_LOG=debug`).
      render: text

  - type: input
    id: version
    attributes:
      label: avxs image tag
      placeholder: "e.g. latest, dev, v0.2.1"
    validations:
      required: true
